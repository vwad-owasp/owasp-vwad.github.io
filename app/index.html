  <script>
    (function () {
      var statusEl = document.getElementById('compat-status');
      var messageEl = document.getElementById('compat-message');

      function setMessage(title, message) {
        if (!statusEl) return;
        var heading = statusEl.querySelector('h1');
        if (heading) heading.textContent = title;
        if (messageEl) messageEl.textContent = message;
      }

      function redirectTo(url) {
        window.location.replace(url);
      }

      function redirectToHome() {
        redirectTo(window.VWAD.getHomeUrl());
      }

      function redirectToSlug(slug) {
        if (!slug) {
          redirectToHome();
          return;
        }
        redirectTo(window.VWAD.getAppUrl({ _slug: slug }));
      }

      function getLegacyTarget() {
        var hash = (window.location.hash || '').replace(/^#/, '').trim();
        if (hash) return { kind: 'slug', value: hash };
        var params = new URLSearchParams(window.location.search || '');
        if (params.get('slug')) return { kind: 'slug', value: params.get('slug').trim() };
        if (params.get('name')) return { kind: 'name', value: params.get('name').trim() };
        return null;
      }

      var target = getLegacyTarget();
      if (!target) {
        redirectToHome();
        return;
      }

      if (target.kind === 'slug') {
        redirectToSlug(target.value);
        return;
      }

      window.VWAD.getAppByName(target.value).then(function (app) {
        if (app && app._slug) {
          redirectTo(window.VWAD.getAppUrl(app));
          return;
        }
        setMessage('Application not found', 'No exact VWAD app match was found for the requested legacy URL.');
      }).catch(function () {
        setMessage('Redirect failed', 'The legacy application URL could not be resolved automatically.');
      });
    })();
  </script>
